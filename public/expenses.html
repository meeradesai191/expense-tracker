<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expenses — Expense Tracker</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<nav>
  <span class="brand">💰 Expense Tracker</span>
  <a href="/">Home</a>
  <a href="/expenses" class="active">Expenses</a>
  <a href="/dashboard">Dashboard</a>
  <a href="/about">About</a>
</nav>

<main>
  <div class="card">
    <h1>Add an expense</h1>
    <div class="form-row">
      <input type="text" name="title" id="titleInput" placeholder="What did you spend on?" />
      <input type="number" name="amount" id="amountInput" placeholder="Amount (₹)" min="0" step="0.01" />
      <select name="category" id="categoryInput">
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Other">Other</option>
      </select>
      <button class="btn" onclick="addExpense()">+ Add</button>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="num" id="totalCount">0</div><div class="lbl">Entries</div></div>
      <div class="stat"><div class="num" id="totalAmount" style="color:#d62828">₹0</div><div class="lbl">Total spent</div></div>
      <div class="stat"><div class="num" id="avgAmount">₹0</div><div class="lbl">Average</div></div>
    </div>
  </div>

  <div class="card">
    <h2>Your expenses</h2>
    <div class="form-row">
      <input type="text" id="searchInput" placeholder="Search by title…" style="flex:2" />
      <select id="filterCategory" style="flex:1">
        <option value="All">All categories</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Other">Other</option>
      </select>
      <select id="sortSelect" style="flex:1">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="highest">Highest amount</option>
        <option value="lowest">Lowest amount</option>
      </select>
      <a class="btn" href="/api/expenses/export" style="text-decoration:none">⬇ Export CSV</a>
    </div>

    <ul class="expense-list" id="expenseList"></ul>
    <div class="empty" id="emptyMsg">No expenses yet. Add one above!</div>
  </div>
</main>

<footer>DevOps Pipeline: Git → GitHub Actions (CI) → Docker (Build) → Deploy</footer>

<script>
  const API = '/api/expenses';
  const CAT_COLORS = { Food: '#fca311', Travel: '#2a9d8f', Shopping: '#e63946', Bills: '#457b9d', Other: '#8d99ae' };
  let editingId = null;

  function buildQuery() {
    const params = new URLSearchParams();
    const cat = document.getElementById('filterCategory').value;
    const search = document.getElementById('searchInput').value.trim();
    const sort = document.getElementById('sortSelect').value;
    if (cat && cat !== 'All') params.set('category', cat);
    if (search) params.set('search', search);
    if (sort) params.set('sort', sort);
    return params.toString();
  }

  async function loadExpenses() {
    const res = await fetch(`${API}?${buildQuery()}`);
    const data = await res.json();
    renderExpenses(data.data);
  }

  function renderExpenses(expenses) {
    const list = document.getElementById('expenseList');
    const empty = document.getElementById('emptyMsg');

    list.innerHTML = '';
    empty.style.display = expenses.length === 0 ? 'block' : 'none';

    let total = 0;
    expenses.forEach(exp => {
      total += exp.amount;
      const li = document.createElement('li');
      li.className = 'expense-item';
      const d = new Date(exp.createdAt);
      const dateStr = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });

      if (editingId === exp.id) {
        li.innerHTML = `
          <span class="cat-dot" style="background:${CAT_COLORS[exp.category] || '#ccc'}"></span>
          <input type="text" id="editTitle" value="${exp.title}" style="flex:1;padding:6px;border-radius:6px;border:1px solid #ddd" />
          <input type="number" id="editAmount" value="${exp.amount}" style="width:80px;padding:6px;border-radius:6px;border:1px solid #ddd" />
          <select id="editCategory" style="padding:6px;border-radius:6px;border:1px solid #ddd">
            ${['Food','Travel','Shopping','Bills','Other'].map(c => `<option value="${c}" ${c===exp.category?'selected':''}>${c}</option>`).join('')}
          </select>
          <button class="del-btn" style="color:#2a9d5c" onclick="saveEdit(${exp.id})">✓</button>
          <button class="del-btn" onclick="cancelEdit()">×</button>
        `;
      } else {
        li.innerHTML = `
          <span class="cat-dot" style="background:${CAT_COLORS[exp.category] || '#ccc'}"></span>
          <span class="title">${exp.title}<br><span class="cat">${exp.category} · ${dateStr}</span></span>
          <span class="amt">₹${exp.amount.toFixed(2)}</span>
          <button class="del-btn" style="color:#457b9d" onclick="startEdit(${exp.id})">✎</button>
          <button class="del-btn" onclick="deleteExpense(${exp.id})">×</button>
        `;
      }
      list.appendChild(li);
    });

    document.getElementById('totalCount').textContent = expenses.length;
    document.getElementById('totalAmount').textContent = '₹' + total.toFixed(2);
    document.getElementById('avgAmount').textContent = '₹' + (expenses.length ? (total / expenses.length).toFixed(2) : '0');
  }

  function startEdit(id) { editingId = id; loadExpenses(); }
  function cancelEdit() { editingId = null; loadExpenses(); }

  async function saveEdit(id) {
    const title = document.getElementById('editTitle').value.trim();
    const amount = document.getElementById('editAmount').value;
    const category = document.getElementById('editCategory').value;
    if (!title || !amount) return;

    await fetch(`${API}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, amount, category })
    });
    editingId = null;
    loadExpenses();
  }

  async function addExpense() {
    const title = document.getElementById('titleInput').value.trim();
    const amount = document.getElementById('amountInput').value;
    const category = document.getElementById('categoryInput').value;
    if (!title || !amount) return;

    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, amount, category })
    });

    if (res.ok) {
      document.getElementById('titleInput').value = '';
      document.getElementById('amountInput').value = '';
      loadExpenses();
    }
  }

  async function deleteExpense(id) {
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    loadExpenses();
  }

  document.getElementById('amountInput').addEventListener('keypress', e => { if (e.key === 'Enter') addExpense(); });
  document.getElementById('searchInput').addEventListener('input', loadExpenses);
  document.getElementById('filterCategory').addEventListener('change', loadExpenses);
  document.getElementById('sortSelect').addEventListener('change', loadExpenses);

  loadExpenses();
</script>
</body>
</html>
